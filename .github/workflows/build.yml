name: build

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/src/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '**/gradle.properties'
      - 'gradle/**'
      - 'buildSrc/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/**'
  push:
    branches: [ main ]
    paths:
      - '**/src/**'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '**/gradle.properties'
      - 'gradle/**'
      - 'buildSrc/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: layer1-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew clean test --no-daemon --stacktrace
