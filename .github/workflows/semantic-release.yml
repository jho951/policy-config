name: semantic-release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-pr:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test

      - name: Compute semantic release
        run: bash scripts/semantic-release.sh

      - name: Read release metadata
        run: |
          echo "VERSION=$(cut -d= -f2 build/semantic-release-version.txt)" >> "$GITHUB_ENV"
          echo "RELEASE_NEEDED=$(cut -d= -f2 build/semantic-release-needed.txt)" >> "$GITHUB_ENV"

      - name: Open release pull request
        if: env.RELEASE_NEEDED == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: release/v${{ env.VERSION }}
          delete-branch: true
          title: chore(release): v${{ env.VERSION }}
          commit-message: chore(release): v${{ env.VERSION }}
          body-path: build/semantic-release-notes.md
          labels: release
          signoff: false
