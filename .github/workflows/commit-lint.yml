name: commit-lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        run: bash scripts/commit-lint.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
