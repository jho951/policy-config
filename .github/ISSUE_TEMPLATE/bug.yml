name: Bug
description: 버그 제보 (재현 절차 + 기대/실제 + 환경)
title: "[BUG] "
labels: ["BUG"]

body:
  - type: markdown
    attributes:
      value: |
        ✅ 작성 팁
        - **재현 방법** + **기대 동작 vs 실제 동작**이 필수입니다.
        - 가능하면 스크린샷/로그를 첨부해주세요.

  - type: textarea
    id: summary
    attributes:
      label: "🐛 버그 요약"
      description: "버그를 한 문장으로 설명해주세요."
      placeholder: |
        예) 경계값 IP가 잘못 허용됩니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔁 재현 절차 (Steps to Reproduce)"
      description: "버그를 재현하는 단계(순서대로)를 적어주세요."
      placeholder: |
        1. 경계값이 포함된 IP 규칙을 설정한다.
        2. 해당 IP로 판정한다.
        3. 기대와 다른 결과를 확인한다.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 동작 (Expected Behavior)"
      placeholder: |
        예) 규칙에 매칭되면 요청이 거부되어야 한다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "🚨 실제 동작 (Actual Behavior)"
      placeholder: |
        예) 요청이 허용되고, 거부 이유가 잘못 계산됨
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: "💻 환경 정보"
      description: "재현/분석에 필요한 환경 정보를 적어주세요."
      placeholder: |
        - 브랜치/커밋:
        - OS / JVM:
        - 로컬 / CI:
        - 관련 규칙 값:
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: "📛 심각도 (Severity)"
      options:
        - "S1 - Blocker (서비스 사용 불가)"
        - "S2 - Critical (핵심 기능 장애/데이터 손상 위험)"
        - "S3 - Major (우회 가능하지만 기능 품질 저하)"
        - "S4 - Minor (경미/UX 수준)"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "📎 로그 / 스크린샷"
      description: "관련 로그, 에러 메시지, 스크린샷 등을 첨부해주세요."
      render: shell
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: "🩹 임시 우회 방법 (있다면)"
      placeholder: |
        예) 특정 설정을 끄면 재현되지 않음 / 브라우저를 바꾸면 정상
    validations:
      required: false

  - type: input
    id: related
    attributes:
      label: "🔗 관련 이슈 / PR"
      placeholder: "예: #123, #456"
    validations:
      required: false
