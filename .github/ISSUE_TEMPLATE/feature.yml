name: Feature
description: 새로운 기능/개선 제안 (배경 → 요구사항 → 범위 → 검증)
title: "[FEATURE] "
labels: ["FEATURE"]

body:
  - type: markdown
    attributes:
      value: |
        ✅ 작성 팁
        - 가능하면 **'왜 필요한가(배경/문제)'**를 먼저 적어주세요. 리뷰가 빨라집니다.
        - 요구사항은 **검수 단위 체크리스트**로 쪼개주세요.

  - type: textarea
    id: overview
    attributes:
      label: "📝 작업 개요"
      description: "추가/개선하려는 기능을 한 문장으로 설명해주세요."
      placeholder: |
        예) 새로운 IP 규칙 문법을 추가할 수 있게 한다.
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "🎯 배경 / 문제 정의"
      description: "이 기능이 필요한 이유, 해결하고 싶은 문제/불편/요구사항을 적어주세요."
      placeholder: |
        예)
        - 규칙 표현 범위를 확장할 필요가 있음
        - core 로직과 파서 책임을 분리하고 싶음
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: "📌 요구 사항 (Acceptance Criteria)"
      description: "구현 단위/검수 단위로 체크리스트를 작성해주세요."
      placeholder: |
        - [ ] 규칙 문법이 추가 가능함
        - [ ] 기존 core 로직과 충돌하지 않음
        - [ ] 테스트가 추가됨
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📚 상세 설명 (선택)"
      description: "화면 흐름/간단 와이어프레임/UX 아이디어, API 설계 초안(링크/내용) 등을 적어주세요."
      placeholder: |
        - 화면: ...
        - API: GET /api/... (query: ...)
    validations:
      required: false

  - type: textarea
    id: scope_in
    attributes:
      label: "🚧 범위 - 포함(In Scope)"
      placeholder: |
        - (예) 새로운 CIDR 변형 문법 추가
        - (예) 새로운 판정 reason 추가
    validations:
      required: false

  - type: textarea
    id: scope_out
    attributes:
      label: "🚧 범위 - 제외(Out of Scope)"
      placeholder: |
        - (예) 외부 시스템 연동
        - (예) UI 전용 변경
    validations:
      required: false

  - type: checkboxes
    id: verification
    attributes:
      label: "✅ 테스트 / 검증 항목"
      description: "완료 시 체크하세요."
      options:
        - label: "단위 테스트 작성/수정"
        - label: "로컬 환경에서 기능 동작 확인"
        - label: "관련 문서(노션, README 등) 업데이트"
        - label: "로그/모니터링 포인트 필요 시 추가"

  - type: input
    id: references
    attributes:
      label: "📎 참고 자료"
      description: "기획/디자인 문서 링크, 관련 이슈 번호 등"
      placeholder: "예: #123, https://..."
    validations:
      required: false
